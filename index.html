<!DOCTYPE html>
<html>
<head>
<title>AI SUPER APP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>
body {background:black;color:white;font-family:Arial;margin:0;}
.container {padding:10px;}
#chat {height:250px;overflow:auto;border:1px solid white;padding:10px;}
.input {display:flex;border:1px solid white;border-radius:20px;margin-top:5px;}
input {flex:1;background:none;border:none;color:white;padding:10px;}
button {background:none;border:none;color:white;padding:10px;}
.section {margin-top:10px;border:1px solid white;padding:10px;}
</style>

</head>

<body>

<div class="container">
<h2>WELCOME 🤝</h2>

<div id="chat"></div>

<div class="input">
<input id="msg" placeholder="Type here">
<button onclick="send()">➤</button>
</div>

<div class="section">
<h3>Notes</h3>
<textarea id="notes" style="width:100%;height:80px;background:black;color:white;"></textarea>
<button onclick="saveNotes()">Save</button>
</div>

<div class="section">
<h3>PDF Viewer</h3>
<input type="file" onchange="pdf(event)">
<iframe id="viewer" width="100%" height="200"></iframe>
</div>

<div class="section">
<h3>CBT</h3>
<p id="q"></p>
<div id="opt"></div>
<p id="res"></p>
</div>

</div>

<script>

// REGISTER SERVICE WORKER
if("serviceWorker" in navigator){
 navigator.serviceWorker.register("sw.js");
}

// MEMORY
let mem = JSON.parse(localStorage.getItem("mem")) || {};

// CHAT
function add(x){
 let c=document.getElementById("chat");
 c.innerHTML+=x;
 c.scrollTop=c.scrollHeight;
}

// AI
function send(){
 let m=document.getElementById("msg").value;
 let l=m.toLowerCase();
 add("<p><b>You:</b>"+m+"</p>");
 let r="";

 if(l.includes("name is")){
   mem.name=m.split("is")[1];
   localStorage.setItem("mem",JSON.stringify(mem));
   r="Yaad rakh liya 😏";
 }
 else if(l.includes("time")){
   r=new Date().toLocaleTimeString();
 }
 else if(l.includes("date")){
   r=new Date().toDateString();
 }
 else if(/[0-9+\-*/]/.test(l)){
   try{r=eval(l);}catch{r="Error";}
 }
 else if(l.includes("photosynthesis")){
   r="Photosynthesis is process where plants make food using sunlight 🌱";
 }
 else if(l.includes("jee")){
   r="Padhle bhai 😤 IIT tera wait kar raha hai";
 }
 else{
   let arr=["Samajh nahi aaya 🤔","Aur bata 😏","Interesting 👀"];
   r=arr[Math.floor(Math.random()*arr.length)];
 }

 setTimeout(()=>add("<p><b>AI:</b>"+r+"</p>"),200);
 document.getElementById("msg").value="";
}

// NOTES
function saveNotes(){
 localStorage.setItem("notes",document.getElementById("notes").value);
 alert("Saved");
}
document.getElementById("notes").value=localStorage.getItem("notes")||"";

// PDF
function pdf(e){
 let f=e.target.files[0];
 document.getElementById("viewer").src=URL.createObjectURL(f);
}

// CBT
let questions=[
 {q:"2+2=?",o:[3,4,5],a:4},
 {q:"5*3=?",o:[15,10,20],a:15}
];
let i=0;

function loadQ(){
 document.getElementById("q").innerText=questions[i].q;
 let html="";
 questions[i].o.forEach(x=>{
  html+=`<button onclick="check(${x})">${x}</button>`;
 });
 document.getElementById("opt").innerHTML=html;
}
loadQ();

function check(x){
 if(x==questions[i].a){
  document.getElementById("res").innerText="Correct 😎";
 } else{
  document.getElementById("res").innerText="Wrong 😭";
 }
 i=(i+1)%questions.length;
 setTimeout(loadQ,1000);
}

</script>

</body>
</html>
