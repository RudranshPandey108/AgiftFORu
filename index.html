<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Batman AI</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* FAB */
#ai-fab{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 0 15px gold;
}
#ai-fab img{
    width:100%;
    border-radius:50%;
}

/* PANEL */
#ai-panel{
    position:fixed;
    bottom:90px;
    right:20px;
    width:320px;
    height:450px;
    background:#020617;
    border:1px solid #334155;
    border-radius:12px;
    display:none;
    flex-direction:column;
}

/* HEADER */
#ai-header{
    padding:10px;
    border-bottom:1px solid #334155;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* CHAT */
#chat-box{
    flex:1;
    overflow:auto;
    padding:10px;
}

/* MESSAGE */
.msg{
    margin:8px 0;
    max-width:80%;
    padding:8px;
    border-radius:10px;
}
.user{
    background:#2563eb;
    align-self:flex-end;
}
.bot{
    background:#1e293b;
}

/* INPUT */
#ai-footer{
    display:flex;
    border-top:1px solid #334155;
}
#input{
    flex:1;
    padding:10px;
    border:none;
    outline:none;
    background:#020617;
    color:white;
}
#send{
    padding:10px;
    cursor:pointer;
    background:gold;
    border:none;
}
</style>
</head>

<body>

<!-- FAB -->
<div id="ai-fab" onclick="toggleAI()">
<img src="https://i.imgur.com/6VBx3io.png">
</div>

<!-- PANEL -->
<div id="ai-panel">

    <div id="ai-header">
        <b>🦇 Batman AI</b>
        <button onclick="toggleAI()">✕</button>
    </div>

    <div id="chat-box"></div>

    <div id="ai-footer">
        <input id="input" placeholder="Ask anything...">
        <button id="send" onclick="sendMsg()">➤</button>
    </div>

</div>

<script>

/* =========================
   BASIC TOGGLE
========================= */
function toggleAI(){
    const panel=document.getElementById('ai-panel');
    panel.style.display = panel.style.display==="flex" ? "none":"flex";
}

/* =========================
   OFFLINE REPLIES
========================= */
const replies = {
    "install":"📱 Chrome → 3 dots → Add to home screen",
    "bookmark":"⭐ Press Ctrl+D to bookmark",
    "feature":"🔥 AI chat, progress tracker, themes"
};

function offlineReply(text){
    text=text.toLowerCase();
    for(let k in replies){
        if(text.includes(k)) return replies[k];
    }
    return null;
}

/* =========================
   CHAT UI
========================= */
function addMsg(text,type){
    const div=document.createElement("div");
    div.className="msg "+type;
    div.innerText=text;
    document.getElementById("chat-box").appendChild(div);
}

/* =========================
   SEND MESSAGE
========================= */
async function sendMsg(){
    const input=document.getElementById("input");
    const text=input.value.trim();
    if(!text) return;

    addMsg(text,"user");
    input.value="";

    // OFFLINE
    const off=offlineReply(text);
    if(off){
        addMsg(off,"bot");
        return;
    }

    // API CALL (OpenRouter Free)
    try{
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer YOUR_API_KEY"
            },
            body:JSON.stringify({
                model:"meta-llama/llama-3.3-70b-instruct:free",
                messages:[
                    {role:"system",content:"You are a helpful AI"},
                    {role:"user",content:text}
                ]
            })
        });

        const data = await res.json();
        const reply = data.choices[0].message.content;

        addMsg(reply,"bot");

    }catch(e){
        addMsg("⚠️ Error: Check API key","bot");
    }
}

/* ENTER KEY */
document.getElementById("input").addEventListener("keydown",function(e){
    if(e.key==="Enter") sendMsg();
});

/* INITIAL MESSAGE */
addMsg("👋 Namaste! Main hoon Batman AI — Ask anything!","bot");

</script>

</body>
</html>
