<!DOCTYPE html>
<html>
<head>
<title>JEE CBT Simulator</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; display:flex; }

#left { width:70%; padding:20px; }
#right { width:30%; background:#1e293b; padding:20px; }

button { padding:10px; margin:5px; cursor:pointer; border:none; }

.option { display:block; width:100%; background:#334155; color:white; margin:5px 0; }
.selected { background:green !important; }

.palette button {
  width:40px; height:40px; margin:3px;
}

.answered { background:green; }
.notanswered { background:red; }
.review { background:purple; }

</style>
</head>

<body>

<div id="left">
<h2>JEE CBT Test</h2>
<div id="timer">Time: 180:00</div>

<h3 id="question"></h3>
<div id="options"></div>

<button onclick="prevQ()">Prev</button>
<button onclick="nextQ()">Next</button>
<button onclick="markReview()">Mark for Review</button>
<button onclick="clearResponse()">Clear</button>
<br><br>
<button onclick="submitTest()">Submit</button>

</div>

<div id="right">
<h3>Question Palette</h3>
<div id="palette" class="palette"></div>
</div>

<script>

// 👉 YAHAN QUESTIONS DAALNE HAIN
let questions = [
{
 q:"2 + 2 = ?",
 options:["1","2","4","5"],
 correct:2
},
{
 q:"Capital of India?",
 options:["Mumbai","Delhi","Kolkata","Chennai"],
 correct:1
}
];

let answers = new Array(questions.length).fill(null);
let review = new Array(questions.length).fill(false);

let currentQ = 0;

// LOAD QUESTION
function loadQuestion(){
 let q = questions[currentQ];

 document.getElementById("question").innerText =
  `Q${currentQ+1}. ${q.q}`;

 let optDiv = document.getElementById("options");
 optDiv.innerHTML = "";

 q.options.forEach((opt,i)=>{
   let btn = document.createElement("button");
   btn.innerText = opt;
   btn.classList.add("option");

   if(answers[currentQ] === i){
     btn.classList.add("selected");
   }

   btn.onclick = ()=>{
     answers[currentQ] = i;
     review[currentQ] = false;
     loadQuestion();
     updatePalette();
   };

   optDiv.appendChild(btn);
 });

 updatePalette();
}

// NAVIGATION
function nextQ(){
 if(currentQ < questions.length-1){
   currentQ++;
   loadQuestion();
 }
}

function prevQ(){
 if(currentQ > 0){
   currentQ--;
   loadQuestion();
 }
}

// MARK REVIEW
function markReview(){
 review[currentQ] = true;
 nextQ();
}

// CLEAR
function clearResponse(){
 answers[currentQ] = null;
 review[currentQ] = false;
 loadQuestion();
}

// PALETTE
function updatePalette(){
 let pal = document.getElementById("palette");
 pal.innerHTML = "";

 questions.forEach((q,i)=>{
   let btn = document.createElement("button");
   btn.innerText = i+1;

   if(review[i]) btn.classList.add("review");
   else if(answers[i] !== null) btn.classList.add("answered");
   else btn.classList.add("notanswered");

   btn.onclick = ()=>{
     currentQ = i;
     loadQuestion();
   };

   pal.appendChild(btn);
 });
}

// TIMER (180 min)
let time = 180*60;

let timer = setInterval(()=>{
 let min = Math.floor(time/60);
 let sec = time%60;

 document.getElementById("timer").innerText =
  `Time: ${min}:${sec<10?"0"+sec:sec}`;

 time--;

 if(time < 0){
   clearInterval(timer);
   submitTest();
 }

},1000);


// SUBMIT
function submitTest(){
 let score = 0;

 questions.forEach((q,i)=>{
   if(answers[i] === q.correct) score += 4;
   else if(answers[i] !== null) score -= 1;
 });

 alert("Your Score: " + score);
}

loadQuestion();

</script>

</body>
</html>
