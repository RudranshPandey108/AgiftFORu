<!DOCTYPE html>
<html>
<head>
<title>JEE CBT PRO UI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

body{
 background:linear-gradient(135deg,#0f172a,#020617);
 color:white;
 display:flex;
 height:100vh;
}

/* LEFT PANEL */
#left{
 width:70%;
 padding:30px;
 display:flex;
 flex-direction:column;
 justify-content:space-between;
}

#question{
 font-size:22px;
 margin-bottom:20px;
}

/* OPTIONS */
.option{
 padding:14px;
 margin:10px 0;
 background:rgba(255,255,255,0.05);
 border-radius:10px;
 cursor:pointer;
 transition:0.3s;
 border:1px solid transparent;
}

.option:hover{
 background:rgba(255,255,255,0.1);
 border:1px solid #38bdf8;
 transform:translateX(5px);
}

.selected{
 background:linear-gradient(45deg,#22c55e,#16a34a);
 color:white;
 box-shadow:0 0 10px rgba(34,197,94,0.7);
}

/* BUTTONS */
.controls button{
 padding:10px 18px;
 margin:5px;
 border:none;
 border-radius:8px;
 cursor:pointer;
 background:#1e293b;
 color:white;
 transition:0.3s;
}

.controls button:hover{
 background:#38bdf8;
 color:black;
 transform:scale(1.05);
}

/* RIGHT PANEL */
#right{
 width:30%;
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(15px);
 padding:20px;
 display:flex;
 flex-direction:column;
 justify-content:space-between;
}

/* TIMER */
#timer{
 font-size:28px;
 font-weight:bold;
 text-align:center;
 margin-bottom:20px;
 color:#38bdf8;
}

/* PALETTE */
.palette{
 display:flex;
 flex-wrap:wrap;
 justify-content:center;
}

.palette button{
 width:45px;
 height:45px;
 margin:5px;
 border-radius:8px;
 border:none;
 cursor:pointer;
 font-weight:bold;
 color:white;
 transition:0.2s;
}

.palette button:hover{
 transform:scale(1.1);
}

/* JUMP BOX */
#jump{
 padding:10px;
 width:80px;
 border-radius:6px;
 border:none;
 margin-right:5px;
}

/* SUBMIT BUTTON */
#submitBtn{
 padding:12px;
 background:#ef4444;
 border:none;
 border-radius:8px;
 color:white;
 font-size:16px;
 cursor:pointer;
 transition:0.3s;
}

#submitBtn:hover{
 background:#dc2626;
 transform:scale(1.05);
}

</style>
</head>

<body>

<div id="left">

<div>
<h2 id="sectionTitle">JEE CBT Simulator</h2>
<br>
<div id="question"></div>
<div id="options"></div>
</div>

<div class="controls">
<button onclick="prevQ()">⬅ Prev</button>
<button onclick="nextQ()">Next ➡</button>
<button onclick="markReview()">⭐ Review</button>

<br><br>

<input type="number" id="jump" placeholder="Q">
<button onclick="jumpQ()">Go</button>
</div>

</div>

<div id="right">

<div>
<div id="timer"></div>
<div class="palette" id="palette"></div>
</div>

<button id="submitBtn" onclick="submitTest()">Submit Test</button>

</div>

let answers=new Array(questions.length).fill(null);
let review=new Array(questions.length).fill(false);
let visited=new Array(questions.length).fill(false);

let currentQ=0;
let time=180*60;

// TIMER
setInterval(()=>{
 time--;
 let m=Math.floor(time/60);
 let s=time%60;
 document.getElementById("timer").innerText=m+":"+(s<10?"0":"")+s;

 if(time===300) alert("⚠️ 5 min left!");
 if(time<=0) submitTest();

},1000);

// LOAD QUESTION
function loadQuestion(){

 visited[currentQ]=true;

 let q=questions[currentQ];
 document.getElementById("question").innerText=(currentQ+1)+". "+q.q;

 let html="";
 q.options.forEach((opt,i)=>{
   html+=`<div class="option ${answers[currentQ]==i?"selected":""}" onclick="selectOption(${i})">${opt}</div>`;
 });

 document.getElementById("options").innerHTML=html;
 updatePalette();
}

// SELECT
function selectOption(i){
 answers[currentQ]=i;
 loadQuestion();
}

// NAV
function nextQ(){ if(currentQ<questions.length-1){currentQ++;loadQuestion();}}
function prevQ(){ if(currentQ>0){currentQ--;loadQuestion();}}

// REVIEW
function markReview(){
 review[currentQ]=!review[currentQ];
 updatePalette();
}

// JUMP
function jumpQ(){
 let val=document.getElementById("jump").value;
 if(val>=1 && val<=questions.length){
   currentQ=val-1;
   loadQuestion();
 }
}

// PALETTE
function updatePalette(){
 let html="";
 for(let i=0;i<questions.length;i++){

   let color="grey";
   if(!visited[i]) color="grey";
   else if(review[i]) color="purple";
   else if(answers[i]!=null) color="green";
   else color="red";

   html+=`<button style="background:${color}" onclick="goTo(${i})">${i+1}</button>`;
 }
 document.getElementById("palette").innerHTML=html;
}

function goTo(i){
 currentQ=i;
 loadQuestion();
}

// SUBMIT
function submitTest(){
 let score=0;

 questions.forEach((q,i)=>{
   if(answers[i]!==null){
     if(answers[i]===q.correct) score+=4;
     else score-=1;
   }
 });

 alert("Score: "+score);
}

// INIT
loadQuestion();

</script>
