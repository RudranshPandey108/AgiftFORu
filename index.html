<!DOCTYPE html>
<html>
<head>
<title>AI SUPER APP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background:black;
  color:white;
  font-family:Arial;
  margin:0;
}

.container {
  padding:10px;
}

#chat-box {
  height:250px;
  overflow-y:auto;
  border:1px solid white;
  padding:10px;
}

.input-box {
  display:flex;
  margin-top:5px;
  border:1px solid white;
  border-radius:20px;
}

input {
  flex:1;
  background:none;
  border:none;
  color:white;
  padding:10px;
}

button {
  background:none;
  border:none;
  color:white;
  padding:10px;
}

.section {
  margin-top:15px;
  border:1px solid white;
  padding:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>WELCOME 🤝</h2>

<!-- CHAT -->
<div id="chat-box"></div>

<div class="input-box">
  <input id="input" placeholder="Type here">
  <button onclick="reply()">➤</button>
  <button onclick="voice()">🎤</button>
</div>

<!-- NOTES -->
<div class="section">
<h3>Notes</h3>
<textarea id="notes" style="width:100%;height:80px;background:black;color:white;"></textarea>
<button onclick="saveNotes()">Save</button>
</div>

<!-- PDF -->
<div class="section">
<h3>PDF Viewer</h3>
<input type="file" onchange="openPDF(event)">
<iframe id="pdf" width="100%" height="200"></iframe>
</div>

<!-- CBT -->
<div class="section">
<h3>CBT Test</h3>
<p id="q">2+2 = ?</p>
<button onclick="ans(4)">4</button>
<button onclick="ans(5)">5</button>
<button onclick="ans(6)">6</button>
<p id="result"></p>
</div>

</div>

<script>

// MEMORY
let memory = JSON.parse(localStorage.getItem("memory")) || {};

// CHAT
function add(msg){
  let box = document.getElementById("chat-box");
  box.innerHTML += "<p>"+msg+"</p>";
  box.scrollTop = box.scrollHeight;
}

// AI LOGIC
function reply(){
  let input = document.getElementById("input");
  let msg = input.value;
  let lower = msg.toLowerCase();
  let res="";

  add("<b>You:</b> "+msg);

  if(lower.includes("name is")){
    memory.name = msg.split("is")[1];
    localStorage.setItem("memory", JSON.stringify(memory));
    res = "Yaad rakh liya 😏";
  }

  else if(lower.includes("time")){
    res = new Date().toLocaleTimeString();
  }

  else if(lower.includes("date")){
    res = new Date().toDateString();
  }

  else if(/[0-9+\-*/]/.test(lower)){
    try{ res = eval(lower); } catch { res="Error"; }
  }

  else if(lower.includes("jee")){
    res = "Padhle bhai 😤 IIT khud nahi milega";
  }

  else{
    let r = ["Samajh nahi aaya 🤔","Nice 👀","Aur bata 😏"];
    res = r[Math.floor(Math.random()*r.length)];
  }

  setTimeout(()=>add("<b>AI:</b> "+res),200);
  input.value="";
}

// VOICE (basic)
function voice(){
  let rec = new webkitSpeechRecognition();
  rec.onresult = (e)=>{
    document.getElementById("input").value = e.results[0][0].transcript;
    reply();
  }
  rec.start();
}

// NOTES SAVE
function saveNotes(){
  localStorage.setItem("notes", document.getElementById("notes").value);
  alert("Saved");
}
document.getElementById("notes").value = localStorage.getItem("notes") || "";

// PDF VIEW
function openPDF(e){
  let file = e.target.files[0];
  let url = URL.createObjectURL(file);
  document.getElementById("pdf").src = url;
}

// CBT
function ans(x){
  if(x==4){
    document.getElementById("result").innerText="Correct 😎";
  } else {
    document.getElementById("result").innerText="Wrong 😭";
  }
}

// PWA INSTALL
if('serviceWorker' in navigator){
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([`
    self.addEventListener('fetch', e=>{});
  `], {type:'text/javascript'})));
}

</script>

</body>
</html>
