<!DOCTYPE html>
<html>
<head>
  <title>CBT Test</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; }
    .container { width: 80%; margin:auto; }
    .question { margin:20px 0; }
    .options button {
      display:block;
      margin:5px 0;
      padding:10px;
      width:100%;
      background:#1e293b;
      color:white;
      border:none;
      cursor:pointer;
    }
    .selected { background:green !important; }
    #timer { font-size:20px; }
  </style>
</head>

<body>
<div class="container">

<h2>JEE CBT Mock Test</h2>
<div id="timer">Time: 180:00</div>

<div id="quiz"></div>

<button onclick="submitTest()">Submit</button>

</div>

<script>

// SAMPLE QUESTIONS (yaha PDF se paste karna)
let questions = [
  {
    q: "What is 2 + 2?",
    options: ["2","3","4","5"],
    correct: 2
  },
  {
    q: "Capital of India?",
    options: ["Mumbai","Delhi","Kolkata","Chennai"],
    correct: 1
  }
];

let answers = new Array(questions.length).fill(null);

// LOAD QUESTIONS
let quizDiv = document.getElementById("quiz");

questions.forEach((item, index) => {
  let qDiv = document.createElement("div");
  qDiv.classList.add("question");

  qDiv.innerHTML = `<h3>Q${index+1}. ${item.q}</h3>`;

  let optDiv = document.createElement("div");

  item.options.forEach((opt, i) => {
    let btn = document.createElement("button");
    btn.innerText = opt;

    btn.onclick = () => {
      answers[index] = i;
      let buttons = optDiv.querySelectorAll("button");
      buttons.forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
    };

    optDiv.appendChild(btn);
  });

  qDiv.appendChild(optDiv);
  quizDiv.appendChild(qDiv);
});


// TIMER (180 min)
let time = 180 * 60;

let timer = setInterval(() => {
  let min = Math.floor(time / 60);
  let sec = time % 60;

  document.getElementById("timer").innerText =
    `Time: ${min}:${sec < 10 ? "0"+sec : sec}`;

  time--;

  if(time < 0){
    clearInterval(timer);
    submitTest();
  }
}, 1000);


// SUBMIT FUNCTION
function submitTest(){
  let score = 0;

  questions.forEach((q, i) => {
    if(answers[i] === q.correct) score += 4;
    else if(answers[i] !== null) score -= 1;
  });

  alert("Your Score: " + score);
}

</script>

</body>
</html>
